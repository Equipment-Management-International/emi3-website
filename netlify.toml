[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Space ID appears in Contentful CDN asset URLs — not a secret
  SECRETS_SCAN_OMIT_KEYS = "CONTENTFUL_SPACE_ID"

# SPA fallback for unmatched routes
[[redirects]]
  from = "/*"
  to = "/404/"
  status = 404
